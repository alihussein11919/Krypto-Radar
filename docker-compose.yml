services:
  postgres:
    image: postgres:15
    container_name: crypto-postgres
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init-airflow-db.sh:/docker-entrypoint-initdb.d/init-airflow-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive -d metastore"]
      interval: 10s
      timeout: 5s
      retries: 5

  metastore:
    build:
      context: ./docker/metastore
      dockerfile: Dockerfile
    container_name: crypto-metastore
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore
        -Djavax.jdo.option.ConnectionUserName=hive
        -Djavax.jdo.option.ConnectionPassword=hive
    volumes:
      - ./data:/data
      - ./conf/hive:/opt/hive/conf
      - ./data/jars/hadoop-aws-3.3.4.jar:/opt/hive/lib/hadoop-aws-3.3.4.jar
      - ./data/jars/aws-java-sdk-bundle-1.12.262.jar:/opt/hive/lib/aws-java-sdk-bundle-1.12.262.jar
    ports:
      - "9083:9083"

  trino:
    image: trinodb/trino:438
    container_name: crypto-trino
    depends_on:
      - metastore
    volumes:
      - ./conf/trino/catalog:/etc/trino/catalog
      - ./data:/data
    ports:
      - "8088:8080"

  spark:
    image: jupyter/pyspark-notebook:spark-3.5.0
    container_name: crypto-spark
    depends_on:
      - metastore
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
    volumes:
      - ./data:/data
      - ./src:/home/jovyan/src
      - ./notebooks:/home/jovyan/notebooks
      - ./conf/spark:/home/jovyan/conf/spark
      - ./data/jars/hadoop-aws-3.3.4.jar:/usr/local/spark/jars/hadoop-aws-3.3.4.jar
      - ./data/jars/aws-java-sdk-bundle-1.12.262.jar:/usr/local/spark/jars/aws-java-sdk-bundle-1.12.262.jar
    ports:
      - "8888:8888"
      - "4040:4040"
    mem_limit: 4g

  minio:
    image: minio/minio:latest
    container_name: crypto-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: crypto-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/crypto-lakehouse;
      echo 'Bucket crypto-lakehouse ready.';
      exit 0;
      "

  grafana:
    image: grafana/grafana-oss:9.5.20
    container_name: crypto-grafana
    depends_on:
      - trino
    environment:
      - GF_INSTALL_PLUGINS=trino-datasource
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=trino-datasource
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./conf/grafana/provisioning:/etc/grafana/provisioning
      - ./conf/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3000:3000"

  airflow-init:
    image: crypto-airflow
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: crypto-airflow-init
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true
        echo "Airflow init complete"

  airflow-webserver:
    image: crypto-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    container_name: crypto-airflow-webserver
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      PYTHONPATH: "/opt/airflow/project"
    volumes:
      - ./data:/opt/airflow/project/data
      - ./src:/opt/airflow/project/src
      - ./scripts:/opt/airflow/project/scripts
      - ./config:/opt/airflow/project/config
      - ./dags:/opt/airflow/project/dags
      - ./data/jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./data/jars/aws-java-sdk-bundle-1.12.262.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
    ports:
      - "8082:8080"
    command: airflow webserver

  airflow-scheduler:
    image: crypto-airflow
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    container_name: crypto-airflow-scheduler
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      PYTHONPATH: "/opt/airflow/project"
    volumes:
      - ./data:/opt/airflow/project/data
      - ./src:/opt/airflow/project/src
      - ./scripts:/opt/airflow/project/scripts
      - ./config:/opt/airflow/project/config
      - ./dags:/opt/airflow/project/dags
      - ./data/jars/hadoop-aws-3.3.4.jar:/opt/spark/jars/hadoop-aws-3.3.4.jar
      - ./data/jars/aws-java-sdk-bundle-1.12.262.jar:/opt/spark/jars/aws-java-sdk-bundle-1.12.262.jar
    command: airflow scheduler

  chromadb:
    image: chromadb/chroma:latest
    container_name: crypto-chromadb
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/8000 && echo -e \"GET /api/v1/heartbeat HTTP/1.0\r\nHost: localhost\r\n\r\n\" >&3 && cat <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: crypto-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/11434 && echo -e \"GET /api/tags HTTP/1.0\r\nHost: localhost\r\n\r\n\" >&3 && cat <&3'"]
      interval: 15s
      timeout: 10s
      retries: 5

  rag-api:
    image: crypto-rag-api
    build:
      context: .
      dockerfile: docker/rag/Dockerfile
    container_name: crypto-rag-api
    depends_on:
      chromadb:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - ./data:/app/data
      - ./src:/app/src
    ports:
      - "8200:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: docker/streamlit/Dockerfile
    container_name: crypto-streamlit
    depends_on:
      - rag-api
    environment:
      - RAG_API_URL=http://rag-api:8000
      - AIRFLOW_API_URL=http://airflow-webserver:8080
    volumes:
      - ./app:/app
    ports:
      - "8501:8501"

volumes:
  postgres_data:
  grafana_data:
  chroma_data:
  ollama_data:
